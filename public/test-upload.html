<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bun File Upload Test</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; color: #38bdf8; }
        .upload-area {
            border: 2px dashed #475569;
            padding: 2rem;
            text-align: center;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: #38bdf8; background: #334155; }
        input[type="file"] { display: none; }
        button {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
            background: #38bdf8;
            border: none;
            border-radius: 0.5rem;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #7dd3fc; }
        #status { margin-top: 1rem; font-size: 0.875rem; word-break: break-all; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        img { max-width: 100%; margin-top: 1rem; border-radius: 0.5rem; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload File</h1>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p>Click or drag file here</p>
            <input type="file" id="fileInput">
        </div>
        <button onclick="uploadFile()">Upload Now</button>
        <div id="status"></div>
        <img id="preview" src="" alt="Preview">
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const preview = document.getElementById('preview');
            
            if (!fileInput.files[0]) {
                status.innerHTML = '<span class="error">Please select a file first!</span>';
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            status.innerText = 'Uploading...';
            preview.style.display = 'none';

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    status.innerHTML = `<span class="success">${result.message}</span><br>URL: ${result.data.url}`;
                    if (result.data.type.startsWith('image/')) {
                        preview.src = result.data.url;
                        preview.style.display = 'block';
                    }
                } else {
                    status.innerHTML = `<span class="error">Error: ${result.error}</span>`;
                }
            } catch (err) {
                status.innerHTML = `<span class="error">Failed to connect to server</span>`;
            }
        }
    </script>
</body>
</html>
